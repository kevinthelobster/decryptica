name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    name: Build, Validate & Sitemap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate content
        run: npx tsx scripts/validate-content.ts
        id: validate

      - name: Sitemap dry-run
        run: npx tsx scripts/generate_article_sitemap.ts --dry-run
        id: sitemap

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: scripts/validate-content.ts
        retention-days: 7

  # ─── Branch Protection Note ───────────────────────────────────────────────
  # After merging this file to `main`, go to:
  #   https://github.com/kevinthelobster/decryptica/settings/branches
  # Add a branch protection rule for `main`:
  #   ☑ Require pull request reviews before merging
  #   ☑ Require status checks to pass before merging
  #   ☑ Select "build-and-validate" from the list of required checks
  #
  # This enforces the gate automatically on all future PRs and direct pushes.
  # ─────────────────────────────────────────────────────────────────────────
